name: Build check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # "build" is a required status check, so the job must always run and
      # report - skip the actual install/build steps (not the whole job) for
      # docs-only PRs. Keep this path list in sync with Cloudflare's "Build
      # watch paths" dashboard setting.
      - name: Check for code changes
        id: filter
        run: |
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" \
            | grep -qE '^(src/|wrangler\.toml$|package(-lock)?\.json$|build\.mjs$)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v6
        if: steps.filter.outputs.code == 'true'
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        if: steps.filter.outputs.code == 'true'
      - run: npm run build
        if: steps.filter.outputs.code == 'true'
