<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>dubsector.dev</title>
  <link rel='stylesheet' href='https://fonts.googleapis.com/css?family=Roboto:400,300,700,100|Montserrat:400,700|Catamaran:400,100'>
  <link rel='stylesheet' href='https://maxcdn.bootstrapcdn.com/font-awesome/4.6.1/css/font-awesome.min.css'>
  <link rel="stylesheet" href="./terminal.css">
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
</head>
<body>
<div class="monitor">
  <div class="crt">
    <div id="terminal"></div>
    <div class="crt-flicker" aria-hidden="true"></div>
    <div class="crt-glass" aria-hidden="true"></div>
    <div class="crt-glitch" aria-hidden="true"></div>
  </div>
  <div class="power-control">
    <span class="power-led" id="powerLed"></span>
    <button class="power-btn" id="powerBtn" type="button" aria-label="Power"></button>
  </div>
</div>
<script src="./terminal.js"></script>
</body>
</html>
