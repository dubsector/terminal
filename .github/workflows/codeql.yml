name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "30 1 * * 0"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
            paths: '^\.github/workflows/'
          - language: javascript-typescript
            build-mode: none
            paths: '^(src/|wrangler\.toml$|package(-lock)?\.json$|build\.mjs$)'

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # "Analyze (*)" is a required status check, so both matrix jobs must
      # always run and report on every PR - skip the actual CodeQL scan
      # (not the whole job) when the diff doesn't touch that language's
      # relevant paths, e.g. a README-only PR shouldn't need to re-scan JS
      # source or workflow files that didn't change.
      - name: Check for relevant changes
        id: filter
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" \
            | grep -qE "${{ matrix.paths }}"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Initialize CodeQL
        if: github.event_name != 'pull_request' || steps.filter.outputs.run == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        if: github.event_name != 'pull_request' || steps.filter.outputs.run == 'true'
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
